<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="vGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="beamGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Dark background circle -->
  <circle cx="20" cy="20" r="19" fill="#1a1a2e"/>
  <circle cx="20" cy="20" r="19" fill="none" stroke="#2d2b55" stroke-width="0.5"/>
  <!-- Scan beam from apex -->
  <path d="M20 28 L16 12 L24 12 Z" fill="url(#beamGrad)" opacity="0.3"/>
  <!-- V shape -->
  <path d="M10 10 L20 28 L30 10" fill="none" stroke="url(#vGrad)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Geometric accents on left arm -->
  <line x1="12.5" y1="13.5" x2="14" y2="13.5" stroke="#06b6d4" stroke-width="0.7" opacity="0.6"/>
  <line x1="14" y1="16" x2="15.5" y2="16" stroke="#3b82f6" stroke-width="0.7" opacity="0.5"/>
  <circle cx="13" cy="11.5" r="0.6" fill="#06b6d4" opacity="0.5"/>
  <!-- Geometric accents on right arm -->
  <line x1="27.5" y1="13.5" x2="26" y2="13.5" stroke="#10b981" stroke-width="0.7" opacity="0.6"/>
  <line x1="26" y1="16" x2="24.5" y2="16" stroke="#3b82f6" stroke-width="0.7" opacity="0.5"/>
  <circle cx="27" cy="11.5" r="0.6" fill="#10b981" opacity="0.5"/>
  <!-- Scan line at apex -->
  <line x1="17" y1="28" x2="23" y2="28" stroke="#06b6d4" stroke-width="0.8" opacity="0.7"/>
  <!-- Small apex glow dot -->
  <circle cx="20" cy="28" r="1.2" fill="#06b6d4" opacity="0.6"/>
</svg>
