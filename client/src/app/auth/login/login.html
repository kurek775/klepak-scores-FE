<div class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900">
  <div class="w-full max-w-md p-6 sm:p-8 bg-white dark:bg-gray-900/50 rounded-2xl shadow-xl border border-gray-200 dark:border-white/[0.06]">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-6 text-center">{{ 'AUTH.LOGIN_TITLE' | transloco }}</h1>

    @if (error()) {
      <div class="mb-4 p-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-300 rounded-lg text-sm">
        {{ error() }}
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">{{ 'AUTH.EMAIL' | transloco }}</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="w-full px-3 py-2 border border-gray-300 dark:border-white/10 dark:bg-white/[0.05] dark:text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500"
          placeholder="you@example.com"
        />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <p class="text-red-500 text-sm mt-1">{{ 'AUTH.EMAIL_INVALID' | transloco }}</p>
        }
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">{{ 'AUTH.PASSWORD' | transloco }}</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="w-full px-3 py-2 border border-gray-300 dark:border-white/10 dark:bg-white/[0.05] dark:text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500"
          placeholder="••••••••"
        />
      </div>

      <div class="text-right">
        <a routerLink="/forgot-password" class="text-sm text-emerald-500 dark:text-emerald-400 hover:underline">{{ 'AUTH.FORGOT_PASSWORD' | transloco }}</a>
      </div>

      <button
        type="submit"
        [disabled]="loading()"
        class="w-full py-2 px-4 bg-gradient-to-r from-blue-600 to-emerald-600 text-white font-medium rounded-lg hover:shadow-lg hover:shadow-emerald-500/25 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        @if (loading()) {
          {{ 'AUTH.LOADING' | transloco }}
        } @else {
          {{ 'AUTH.LOGIN_BTN' | transloco }}
        }
      </button>
    </form>

    <p class="mt-4 text-center text-sm text-gray-600 dark:text-gray-400">
      {{ 'AUTH.NO_ACCOUNT' | transloco }}
      <a routerLink="/register" class="text-emerald-500 dark:text-emerald-400 hover:underline">{{ 'AUTH.REGISTER_BTN' | transloco }}</a>
    </p>
  </div>
</div>
