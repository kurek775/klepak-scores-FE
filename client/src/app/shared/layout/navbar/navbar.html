<nav class="bg-gray-50/80 dark:bg-gray-900/80 backdrop-blur-xl border-b border-gray-200/60 dark:border-white/[0.06] px-6 py-3">
  <div class="flex items-center justify-between max-w-5xl mx-auto">

    <a routerLink="/dashboard" class="flex items-center gap-2 text-lg font-bold text-gray-900 dark:text-white whitespace-nowrap">
      <img src="logo.svg" alt="Vör" class="w-8 h-8">
      Vör
    </a>

    <!-- Mobile: theme + lang + sign out -->
    <div class="flex items-center gap-2 md:hidden">
      <button
        (click)="themeService.toggle()"
        class="p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white"
        aria-label="Toggle theme"
      >
        @if (themeService.isDark()) {
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 7a5 5 0 110 10A5 5 0 0112 7z" />
          </svg>
        } @else {
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
        }
      </button>

      <div class="flex items-center gap-1 text-xs font-medium">
        <button
          (click)="setLang('cs')"
          [class]="activeLang === 'cs' ? 'text-emerald-400 font-bold' : 'text-gray-400 hover:text-gray-700'"
        >CS</button>
        <span class="text-gray-300 dark:text-gray-700">|</span>
        <button
          (click)="setLang('en')"
          [class]="activeLang === 'en' ? 'text-emerald-400 font-bold' : 'text-gray-400 hover:text-gray-700'"
        >EN</button>
      </div>

      <button (click)="logout()" class="p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white" aria-label="Sign out">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
      </button>
    </div>

    <!-- Desktop: theme + lang + user info + sign out -->
    <div class="hidden md:flex items-center gap-4">
      <!-- Theme toggle -->
      <button
        (click)="themeService.toggle()"
        class="p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white"
        aria-label="Toggle theme"
      >
        @if (themeService.isDark()) {
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 7a5 5 0 110 10A5 5 0 0112 7z" />
          </svg>
        } @else {
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
        }
      </button>

      <!-- Language switcher -->
      <div class="flex items-center gap-1 text-xs font-medium">
        <button
          (click)="setLang('cs')"
          [class]="activeLang === 'cs' ? 'text-emerald-400 font-bold' : 'text-gray-400 hover:text-gray-700'"
        >CS</button>
        <span class="text-gray-300 dark:text-gray-700">|</span>
        <button
          (click)="setLang('en')"
          [class]="activeLang === 'en' ? 'text-emerald-400 font-bold' : 'text-gray-400 hover:text-gray-700'"
        >EN</button>
      </div>

      @if (authService.user(); as user) {
        <div class="flex items-center gap-2">
          <span class="text-sm text-gray-700 dark:text-gray-300">{{ user.full_name }}</span>
          <span
            class="text-xs px-2 py-0.5 rounded-full font-medium"
            [class]="user.role === 'SUPER_ADMIN'
              ? 'bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-300'
              : user.role === 'ADMIN'
                ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300'
                : 'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300'"
          >
            {{ user.role }}
          </span>
        </div>
      }
      <button (click)="logout()" class="text-sm text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200">
        {{ 'COMMON.SIGN_OUT' | transloco }}
      </button>
    </div>
  </div>
</nav>
