<nav class="sticky top-0 z-50 glass-panel border-b border-gray-200/60 dark:border-white/[0.06] backdrop-blur-2xl px-6 py-4">
  <div class="flex items-center justify-between max-w-5xl mx-auto">

    <a routerLink="/dashboard" class="flex items-center gap-3 text-xl font-bold tracking-tight text-gray-900 dark:text-white group">
      <div class="relative">
        <div class="absolute inset-0 bg-brand-500 blur-lg opacity-20 group-hover:opacity-40 transition-opacity"></div>
        <img src="logo.svg" alt="Vör" class="relative w-9 h-9">
      </div>
      Vör
    </a>

    <!-- Mobile Menu Toggle (Simplified for brevity, assuming standard mobile behavior) -->
    <div class="flex items-center gap-3 md:hidden">
      <button
        (click)="themeService.toggle()"
        class="glass-panel p-2.5 rounded-xl text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition-all active:scale-90"
      >
        @if (themeService.isDark()) {
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 7a5 5 0 110 10A5 5 0 0112 7z" />
          </svg>
        } @else {
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
        }
      </button>
      <button (click)="logout()" class="glass-panel p-2.5 rounded-xl text-gray-500 dark:text-gray-400 hover:text-red-500 transition-all active:scale-90">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
      </button>
    </div>

    <!-- Desktop Menu -->
    <div class="hidden md:flex items-center gap-6">
      <!-- Theme toggle -->
      <button
        (click)="themeService.toggle()"
        class="glass-panel p-2.5 rounded-xl text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition-all hover:scale-105 active:scale-95 shadow-sm"
        aria-label="Toggle theme"
      >
        @if (themeService.isDark()) {
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 7a5 5 0 110 10A5 5 0 0112 7z" />
          </svg>
        } @else {
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
        }
      </button>

      <!-- Language switcher -->
      <div class="flex items-center gap-1 rounded-full glass-panel px-1.5 py-1 text-xs font-bold">
        <button
          (click)="setLang('cs')"
          class="rounded-full px-3 py-1 transition-all"
          [class]="activeLang === 'cs' ? 'bg-brand-500 text-white shadow-sm' : 'text-gray-500 dark:text-gray-400 hover:text-gray-900'"
        >CS</button>
        <button
          (click)="setLang('en')"
          class="rounded-full px-3 py-1 transition-all"
          [class]="activeLang === 'en' ? 'bg-brand-500 text-white shadow-sm' : 'text-gray-500 dark:text-gray-400 hover:text-gray-900'"
        >EN</button>
      </div>

      @if (authService.user(); as user) {
        <div class="flex items-center gap-4 pl-4 border-l border-gray-200 dark:border-white/10">
          <div class="flex flex-col items-end">
            <span class="text-sm font-bold text-gray-900 dark:text-white tracking-tight">{{ user.full_name }}</span>
            <span
              class="text-[10px] uppercase tracking-widest font-black"
              [class]="user.role === 'SUPER_ADMIN'
                ? 'text-red-500'
                : user.role === 'ADMIN'
                  ? 'text-brand-500'
                  : 'text-blue-500'"
            >
              {{ user.role }}
            </span>
          </div>
          <button (click)="logout()" class="glass-panel p-2.5 rounded-xl text-gray-500 dark:text-gray-400 hover:text-red-500 transition-all hover:scale-105 active:scale-95" title="Odhlásit se">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
          </button>
        </div>
      }
    </div>
  </div>
</nav>
